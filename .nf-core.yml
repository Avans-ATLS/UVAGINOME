repository_type: pipeline

nf_core_version: 3.3.2

lint:
  files_unchanged:
    - .prettierignore
    - .prettierignore
    - .prettierignore
    - CODE_OF_CONDUCT.md
    - assets/nf-core-uvaginome_logo_light.png
    - docs/images/nf-core-uvaginome_logo_light.png
    - docs/images/nf-core-uvaginome_logo_dark.png
    - .github/ISSUE_TEMPLATE/bug_report.yml
    - .github/CONTRIBUTING.md
    - .github/PULL_REQUEST_TEMPLATE.md
    - assets/email_template.txt
    - docs/README.md
    - .github/CONTRIBUTING.md
    - .prettierignore
  nextflow_config:
    - manifest.name
    - manifest.homePage
    - validation.help.beforeText
    - validation.help.afterText
    - validation.summary.beforeText
    - validation.summary.afterText
  multiqc_config:
    - report_comment
  files_exist:
    - assets/email_template.html
    - assets/sendmail_template.txt
    - assets/email_template.txt
    - .github/workflows/branch.yml
    - .github/workflows/nf-test.yml
    - .github/actions/get-shards/action.yml
    - .github/actions/nf-test/action.yml
    - .github/workflows/linting_comment.yml
    - .github/workflows/linting.yml
    - CODE_OF_CONDUCT.md
    - assets/nf-core-uvaginome_logo_light.png
    - docs/images/nf-core-uvaginome_logo_light.png
    - docs/images/nf-core-uvaginome_logo_dark.png
    - .github/ISSUE_TEMPLATE/config.yml
    - .github/workflows/awstest.yml
    - .github/workflows/awsfulltest.yml
    - CHANGELOG.md
    - conf/igenomes.config
    - conf/igenomes_ignored.config

template:
  org: ATLS
  name: UVAGINOME
  description: Pipeline that performs taxonomic classification on metagenomic or amplicon
    ONT sequence data. Developed for Unravelling the Vaginome project
  author: Birgit Rijvers-van Pruissen
  version: 1.0.0dev
  force: true
  outdir: .
  skip_features:
    - changelog
    - ci
    - igenomes
    - gpu
    - gitpod
    - codespaces
    - vscode
    - rocrate
    - email
    - adaptivecard
    - slackreport
  is_nfcore: false
